name: Publish Common Utils Package

on:
  push:
    branches: [ main ]
    paths: [ 'gradle/libs.versions.toml' ]

permissions:
  contents: read
  packages: write

jobs:
  check-and-publish:
    env:
      GH_USERNAME: ${{ secrets.GH_USERNAME }}
      GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check if version changed
        id: check_version
        run: |
          # Get the previous commit hash on main
          PREV_COMMIT=$(git rev-parse HEAD^)
          # Extract the line from both versions, Use xargs to trim whitespace
          OLD_LINE=$(git show $PREV_COMMIT:gradle/libs.versions.toml | grep '^common-utils =' | xargs)
          NEW_LINE=$(grep '^common-utils =' gradle/libs.versions.toml | xargs)
          echo "Old: $OLD_LINE"
          echo "New: $NEW_LINE"
          if [ "$OLD_LINE" != "$NEW_LINE" ] && [ -n "$NEW_LINE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to GitHub Packages
        if: steps.check_version.outputs.changed == 'true'
        run: chmod +x ./gradlew && ./gradlew publishAllPublicationsToGitHubPackagesRepository
